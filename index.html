<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Schokobanana-Studios</title>

    <!-- Lottie -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js">
    </script>

   <script>
        const repo = location.hostname === "localhost" || location.hostname === "127.0.0.1"
            ? "/"
            : "/Test/";

        document.write(`<base href="${repo}">`);
    </script>

    <script src="js/main.js" defer></script>
    <script src="js/lottie.js" defer></script>

    <link rel="stylesheet" href="css/main.css">

</head>

<body>

     HERO
========================== -->

    <header class="hero">

        <div class="hero-overlay">

            <lottie-player id="bananusAnim" src="assets/lottie/bananus/bananus_sunglasses.json"

            </lottie-player>

            <h1 class="hero-title">
                Schokobanana-Studios
            </h1>

        </div>

    </header>

    <!-- =========================
         NAVIGATION
    ========================== -->

    <nav class="navbar">

        <a href="/index.html">Home</a>

        <a href="/games/games.html">Games</a>

        <a href="/about.html">About</a>

    </nav>

    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main class="content" style="background-color: var(--clr-sky);">

        <!-- =========================
     NEWS
========================== -->

        <section class="news-feed">

            <a href="/games/game1/updates/steam-page.html" class="news-card hover-scale">

                <img src="assets/img/latest/latest_24_06_26.png" alt="News Placeholder">

            </a>

            <a href="/games/game1/updates/demo-release.html" class="news-card news-card--featured hover-scale">

            <a href="/games/game1/updates/steam-page.html" class="news-card hover-scale">

                <img src="assets/img/latest/latest_27_04_25.png" alt="News Placeholder">

            </a>

            <a href="/games/game1/updates/steam-page.html" class="news-card hover-scale">

                <img src="assets/img/latest/latest_09_04_25.png" alt="News Placeholder">

            </a>

        <!-- =========================
     SOCIAL LINKS
========================== -->

        <aside class="social-links">

            <a id="discordLink" href="https://discord.gg/pjwB3BZM4F" target="_blank" rel="noopener noreferrer">

                <lottie-player id="discordAnim" src="assets/lottie/links/discord-in.json" background="transparent"
                    speed="1">
                </lottie-player>

            </a>

            <a id="youtubeLink" href="https://www.youtube.com/@Schokobanana-Studios" target="_blank"
                rel="noopener noreferrer">

                <lottie-player id="youtubeAnim" src="assets/lottie/links/youtube-in.json" background="transparent"

                </lottie-player>

            </a>

            <a id="itchioLink" href="https://schokobanana-studios.itch.io/" target="_blank" rel="noopener noreferrer">

                <lottie-player id="itchioAnim" src="assets/lottie/links/itchio-in.json" background="transparent"
                    speed="1">
                </lottie-player>

            </a>
        </aside>

         FOOTER
    ========================== -->

    <footer>

        <p>© 2026 Schokobanana-Studios, All rights reserved.</p>
