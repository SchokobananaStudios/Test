<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lottie Demo</title>

  <!-- Lottie Player -->
  <script
    src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js">
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }
  </style>
</head>

<body>

  <lottie-player
    src="./Bananus_Sunglasses.json"
    background="transparent"
    speed="1"
    style="width: 500px; height: 500px;"
    loop
    autoplay>
  </lottie-player>

</body>
</html>
