<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Schokobanana-Studios</title>

    <!-- Lottie -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js">
    </script>

    <script src="/Test/js/main.js" defer></script>
    <script src="/Test/js/lottie.js" defer></script>

    <link rel="stylesheet" href="/Test/css/main.css">

</head>

<body>

    <!-- =========================
     HERO
========================== -->

    <header class="hero">

        <img src="/Test/assets/img/banner.png" alt="Studio Banner" class="hero-banner">

        <div class="hero-overlay">

            <lottie-player id="bananusAnim" src="/Test/assets/lottie/bananus/bananus_sunglasses.json" background="transparent"
                speed="1" autoplay>
            </lottie-player>

            <h1 class="hero-title">
                Schokobanana-Studios
            </h1>

        </div>

    </header>

    <!-- =========================
         NAVIGATION
    ========================== -->

    <nav class="navbar">

        <a href="/Test/index.html">Home</a>

        <a href="/Test/games.html">Games</a>

        <a href="/Test/about.html">About</a>

    </nav>

    <!-- =========================
         MAIN CONTENT
    ========================== -->

    <main class="content" style="background-color: var(--clr-sky);">

        <!-- =========================
     NEWS
========================== -->

        <section class="news-feed">

            <h1 class="title center">
                Latest News
            </h1>

            <!--TODO: href-->
            <a class="news-card hover-scale">

                <img src="/Test/assets/img/latest/latest_24_06_26.png" alt="News Placeholder">

            </a>

            <a href="https://schokobananastudios.github.io/Skull-Knight/news.html"
                class="news-card news-card--featured hover-scale">

                <img src="/Test/assets/img/latest/latest_20_05_25.png" alt="Latest News May 20, 2025">

            </a>

            <a href="https://schokobananastudios.github.io/Skull-Knight/news.html" class="news-card hover-scale">

                <img src="/Test/assets/img/latest/latest_27_04_25.png" alt="Latest News April 27, 2025">

            </a>

            <a href="https://schokobananastudios.github.io/Skull-Knight/news.html" class="news-card hover-scale">

                <img src="/Test/assets/img/latest/latest_09_04_25.png" alt="Latest News April 9, 2025">

            </a>
        </section>

        <!-- =========================
     SOCIAL LINKS
========================== -->

        <aside class="social-links">

            <a id="discordLink" href="https://discord.gg/pjwB3BZM4F" target="_blank" rel="noopener noreferrer">

                <lottie-player id="discordAnim" src="/Test/assets/lottie/links/discord-in.json" background="transparent"
                    speed="1">
                </lottie-player>

            </a>

            <a id="youtubeLink" href="https://www.youtube.com/@Schokobanana-Studios" target="_blank"
                rel="noopener noreferrer">

                <lottie-player id="youtubeAnim" src="/Test/assets/lottie/links/youtube-in.json" background="transparent"
                    speed="1">
                </lottie-player>

            </a>

            <a id="itchioLink" href="https://schokobanana-studios.itch.io/" target="_blank" rel="noopener noreferrer">

                <lottie-player id="itchioAnim" src="/Test/assets/lottie/links/itchio-in.json" background="transparent"
                    speed="1">
                </lottie-player>

            </a>
        </aside>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer>

        <p>© 2026 Schokobanana-Studios, All rights reserved.</p>
        <p>schokobanana.studios@gmail.com</p>

    </footer>

</html>
